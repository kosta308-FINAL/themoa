name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: themoa-deploy-solmin-278654856711
  WEB_INSTANCE_ID: i-0093d78d5955c4875
  ZIP_NAME: themoa-web.zip

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Zip dist
        working-directory: frontend/dist
        run: zip -r "../../${ZIP_NAME}" .

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload zip to S3
        run: aws s3 cp "${ZIP_NAME}" "s3://${S3_BUCKET}/${ZIP_NAME}"

      - name: Send deploy command to Web EC2 via SSM
        id: deploy
        run: |
          PARAMS=$(jq -n \
            --arg bucket "$S3_BUCKET" \
            --arg zip "$ZIP_NAME" \
            '{commands: [
              "mkdir -p /home/ssm-user/deploy",
              ("aws s3 cp s3://" + $bucket + "/" + $zip + " /home/ssm-user/deploy/" + $zip),
              "rm -rf /home/ssm-user/deploy/web",
              "mkdir -p /home/ssm-user/deploy/web",
              ("unzip -q -o /home/ssm-user/deploy/" + $zip + " -d /home/ssm-user/deploy/web"),
              "rm -rf /var/www/themoa",
              "mkdir -p /var/www/themoa",
              "cp -r /home/ssm-user/deploy/web/. /var/www/themoa/",
              "chown -R www-data:www-data /var/www/themoa",
              "nginx -t",
              "systemctl reload nginx"
            ]}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$WEB_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "GitHub Actions deploy ${GITHUB_SHA}" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for command to finish
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id "${WEB_INSTANCE_ID}"

      - name: Show command output
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id "${WEB_INSTANCE_ID}"

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://www.themoa.kro.kr)
            if [ "$code" = "200" ]; then
              echo "Health check OK"
              exit 0
            fi
            echo "waiting for health check... (got ${code})"
            sleep 5
          done
          echo "Health check failed"
          exit 1
