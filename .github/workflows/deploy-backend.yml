name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: themoa-deploy-solmin-278654856711
  APP_INSTANCE_ID: i-0928cf855d2b72719
  JAR_NAME: themoa-0.0.1-SNAPSHOT.jar

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant execute permission for gradlew
        working-directory: backend
        run: chmod +x gradlew

      - name: Build with Gradle (bootJar)
        working-directory: backend
        run: ./gradlew bootJar -x test

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload jar to S3
        run: |
          aws s3 cp "backend/build/libs/${JAR_NAME}" "s3://${S3_BUCKET}/${JAR_NAME}"

      - name: Send deploy command to App EC2 via SSM
        id: deploy
        run: |
          PARAMS=$(jq -n \
            --arg bucket "$S3_BUCKET" \
            --arg jar "$JAR_NAME" \
            '{commands: [
              ("aws s3 cp s3://" + $bucket + "/" + $jar + " /home/ssm-user/app/themoa.jar"),
              "chown ssm-user:ssm-user /home/ssm-user/app/themoa.jar",
              "mkdir -p /etc/systemd/system/themoa.service.d",
              "printf \"[Service]\nEnvironment=POLICY_DAILY_SYNC_ENABLED=true\n\" > /etc/systemd/system/themoa.service.d/policy-sync.conf",
              "systemctl daemon-reload",
              "systemctl restart themoa",
              "sleep 5",
              "systemctl is-active themoa",
              "systemctl show themoa --property=Environment --value | grep -Eq '(^| )POLICY_DAILY_SYNC_ENABLED=true( |$)'"
            ]}')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$APP_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "GitHub Actions deploy ${GITHUB_SHA}" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for command to finish
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id "${APP_INSTANCE_ID}"

      - name: Show command output
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id "${APP_INSTANCE_ID}"

      - name: Health check
        run: |
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://www.themoa.kro.kr/api/health)
            if [ "$code" = "200" ]; then
              echo "Health check OK"
              exit 0
            fi
            echo "waiting for health check... (got ${code})"
            sleep 5
          done
          echo "Health check failed"
          exit 1
